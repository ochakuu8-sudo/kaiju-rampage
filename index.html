<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール | Kaiju Pinball</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      border: 2px solid #333;
      background: #0a0a0a;
      max-width: 100vh;
      max-height: 100vh;
    }

    #container {
      position: relative;
      width: 360px;
      height: 640px;
      aspect-ratio: 9 / 16;
      overflow: hidden;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      font-family: Arial, sans-serif;
      color: white;
      z-index: 10;
    }

    #score-display, #balls-display {
      font-size: 16px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    #score-display {
      position: absolute;
      top: 10px;
      left: 10px;
    }

    #balls-display {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    #combo-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      color: #ffff00;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
      display: none;
    }

    #game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
      z-index: 20;
    }

    #game-over-overlay.show {
      display: flex;
    }

    @media (max-width: 480px) {
      #container {
        width: 100vmin * 0.9;
        height: 100vmin * 1.6;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DnXOc7oX.js"></script>
</head>
<body>
  <div id="container">
    <canvas id="gameCanvas" width="360" height="640"></canvas>

    <!-- UI Overlay -->
    <div id="ui-overlay">
      <div id="score-display">Score: 0</div>
      <div id="balls-display">Balls: 3</div>
      <div id="combo-display">×3!</div>
      <div id="game-over-overlay">
        <div style="font-size: 48px; font-weight: bold; margin-bottom: 20px;">GAME OVER</div>
        <div id="final-score" style="font-size: 24px; margin-bottom: 40px;">Final Score: 0</div>
        <div style="font-size: 16px;">Tap to restart</div>
      </div>
    </div>
  </div>
</body>
</html>
