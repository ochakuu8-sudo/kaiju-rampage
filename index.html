<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール | Kaiju Pinball</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      border: 2px solid #333;
      background: #0a0a0a;
      max-width: 100vh;
      max-height: 100vh;
    }

    #container {
      position: relative;
      width: 360px;
      height: 640px;
      aspect-ratio: 9 / 16;
    }

    @media (max-width: 480px) {
      #container {
        width: 100vmin * 0.9;
        height: 100vmin * 1.6;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="gameCanvas" width="360" height="640"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
