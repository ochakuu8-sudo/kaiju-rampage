<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 360px; height: 580px;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 360px; height: 580px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* ワールド空間ポップアップレイヤー: コンテナごとカメラ追従 */
    #popup-layer {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 0;
      overflow: visible;
    }
    /* 距離・ゾーン表示は画面から非表示 (燃料ゲージに集中させる) */
    #distance-display, #zone-display { display: none; }
    /* 燃料メーター (レトロゲーム風 HP バー: セグメント分割 + チャンキー枠) */
    #life-wrap {
      position: absolute; top: 8px; left: 8px; right: 8px;
      height: 14px;
      background: #1a1208;
      border: 2px solid #e8a020;
      border-radius: 0;
      box-shadow:
        inset 0 0 0 1px #000,
        0 0 6px rgba(232, 160, 32, 0.55),
        2px 2px 0 #000;
      overflow: hidden;
      image-rendering: pixelated;
    }
    /* ラベル "FUEL" をバー内左上に */
    #life-wrap::before {
      content: 'FUEL';
      position: absolute; top: 1px; left: 3px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; letter-spacing: 1px;
      color: #000;
      text-shadow: 0 1px 0 rgba(255,255,255,0.25);
      z-index: 2;
      pointer-events: none;
    }
    #life-fill {
      height: 100%;
      width: 0%;
      /* セグメント分割: 固定 30px ピッチで 2px の目地 */
      background:
        repeating-linear-gradient(90deg,
          transparent 0 28px,
          rgba(0,0,0,0.55) 28px 30px),
        linear-gradient(180deg,
          #fff080 0%, #ffd020 35%, #cc8800 100%);
      transition: width 0.12s linear;
    }
    /* ピンチ (low): オレンジ赤 + 点滅 */
    #life-wrap.low #life-fill {
      background:
        repeating-linear-gradient(90deg,
          transparent 0 28px,
          rgba(0,0,0,0.6) 28px 30px),
        linear-gradient(180deg,
          #ffaa55 0%, #ff5522 40%, #aa2200 100%);
      animation: blink 0.5s steps(2) infinite;
    }
    /* クリティカル (crit): 純赤 + 高速点滅 */
    #life-wrap.crit #life-fill {
      background:
        repeating-linear-gradient(90deg,
          transparent 0 28px,
          rgba(0,0,0,0.6) 28px 30px),
        linear-gradient(180deg, #ff6644 0%, #dd0000 50%, #881100 100%);
      animation: blink 0.18s steps(2) infinite;
    }

    /* ゲームオーバー */
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #gameover.show { display: flex; }
    #gameover h1  { font-family: 'Press Start 2P', monospace; font-size: 28px; color: #f44; text-shadow: 3px 3px 0 #000; letter-spacing: 3px; margin-bottom: 4px; }
    #final-best   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #final-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #go-tap       { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* クリア画面 */
    #clear {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #clear.show { display: flex; }
    #clear h1  {
      font-family: 'Press Start 2P', monospace; font-size: 28px;
      color: #ffe680; text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,220,80,0.6);
      letter-spacing: 3px; margin-bottom: 4px;
      animation: clearPulse 1s infinite alternate;
    }
    @keyframes clearPulse { from { filter: brightness(1); } to { filter: brightness(1.35); } }
    #clear-dist   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #clear-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #clear-tap    { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }

  </style>
  <script type="module" crossorigin src="/kaiju-rampage/assets/index-BB_1pPcL.js"></script>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="360" height="580"></canvas>
  <div id="overlay">
    <div id="popup-layer"></div>
    <div id="distance-display">0 m</div>
    <div id="zone-display">Stage 1</div>
    <div id="life-wrap"><div id="life-fill"></div></div>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div id="final-best">0 m | 0 破壊</div>
    <div id="final-stats">0 人踏み</div>
    <div id="go-tap">タップで再スタート</div>
  </div>
  <div id="clear">
    <h1>CLEAR!</h1>
    <div id="clear-dist">0 m | 0 破壊</div>
    <div id="clear-stats">0 人踏み</div>
    <div id="clear-tap">タップで再スタート</div>
  </div>
</div>
</body>
</html>
