<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 360px; height: 580px;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 360px; height: 580px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
    }
    #score { position: absolute; top: 8px; left: 10px; font-size: 18px; text-shadow: 0 1px 4px #000; }
    #hi    { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); font-size: 13px; color: #aaa; }
    #balls { position: absolute; top: 8px; right: 10px; font-size: 18px; text-shadow: 0 1px 4px #000; }
    #stage { position: absolute; top: 30px; right: 10px; font-size: 12px; color: #88f; }
    #combo {
      position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%);
      font-size: 56px; font-weight: 900;
      color: #ff0; text-shadow: 0 0 24px #f80, 0 2px 6px #000;
      display: none; pointer-events: none; white-space: nowrap;
    }
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.82);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 18px; pointer-events: auto; z-index: 10;
    }
    #gameover.show { display: flex; }
    #gameover h1  { font-size: 52px; color: #f44; text-shadow: 0 0 20px #f00; }
    #final-score  { font-size: 22px; }
    #final-best   { font-size: 15px; color: #aaa; }
    #go-tap       { font-size: 17px; color: #8f8; margin-top: 12px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    #stageclear {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 12px; pointer-events: none; z-index: 9;
    }
    #stageclear.show { display: flex; }
    #stageclear h2  { font-size: 44px; color: #0f0; text-shadow: 0 0 20px #0f0; }
    #clear-bonus    { font-size: 20px; color: #ff0; }
  </style>
  <script type="module" crossorigin src="/kaiju-rampage/assets/index-nA0J-13I.js"></script>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="360" height="580"></canvas>
  <div id="overlay">
    <div id="score">SCORE: 0</div>
    <div id="hi">BEST: 0</div>
    <div id="balls">●●●</div>
    <div id="stage">STAGE 1</div>
    <div id="combo"></div>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div id="final-score">Score: 0</div>
    <div id="final-best">Best: 0</div>
    <div id="go-tap">タップで再スタート</div>
  </div>
  <div id="stageclear">
    <h2>STAGE CLEAR!</h2>
    <div id="clear-bonus"></div>
  </div>
</div>
</body>
</html>
