<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 360px; height: 580px;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 360px; height: 580px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* ワールド空間ポップアップレイヤー: コンテナごとカメラ追従 */
    #popup-layer {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 0;
      overflow: visible;
    }
    /* 距離: 左上 */
    #distance-display { position: absolute; top: 8px; left: 10px; font-size: 13px; color: #8cf; text-shadow: 0 1px 4px #000; }
    /* ゾーン名: 距離の右 */
    #zone-display { position: absolute; top: 8px; left: 10px; margin-top: 22px; font-size: 11px; color: #adf; text-shadow: 0 1px 4px #000; }
    /* スピードメーター (レースゲーム風) */
    #life-wrap {
      position: absolute; top: 36px; left: 8px; right: 48px;
      height: 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      overflow: hidden;
    }
    #life-fill {
      height: 100%;
      width: 0%;
      /* グラデーションはメーター実幅 (px) で固定描画し、fill の width で
         マスクする。background-size は JS 側で `${wrap.clientWidth}px 100%`
         に上書きされる。10% ごとにはっきり色が切り替わる 10 段階。 */
      background-image: linear-gradient(90deg,
        #0048ff 0% 10%,
        #0088ff 10% 20%,
        #00ccff 20% 30%,
        #00e8a0 30% 40%,
        #22cc22 40% 50%,
        #aadd00 50% 60%,
        #ffee00 60% 70%,
        #ff8800 70% 80%,
        #ff2222 80% 90%,
        #ff00aa 90% 100%);
      background-repeat: no-repeat;
      background-position: left center;
      background-size: 10000% 100%;
      border-radius: 5px;
      transition: width 0.12s;
      box-shadow: 0 0 6px currentColor;
    }
    #life-fill.high { animation: speedpulse 0.4s infinite alternate; }
    @keyframes speedpulse { from { filter: brightness(1); } to { filter: brightness(1.4); } }
    /* 速度数値: バーの右 */
    #speed-number {
      position: absolute; top: 32px; right: 8px;
      font-size: 12px; font-weight: 400;
      color: #fff; text-shadow: 2px 2px 0 #000, 0 0 6px #0cf;
      font-family: 'Press Start 2P', monospace;
      letter-spacing: 0.5px;
      min-width: 36px; text-align: right;
    }

    /* 燃料バー: 上部中央 (タイマーの代替) */
    #fuel-wrap {
      position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
      width: 160px; height: 14px;
      background: rgba(0,0,0,0.6);
      border: 2px solid #ffd866;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 0 8px rgba(255,200,80,0.3);
    }
    #fuel-fill {
      height: 100%; width: 70%;
      background: linear-gradient(90deg, #ff8800 0%, #ffdd44 60%, #ffee88 100%);
      transition: width 0.12s linear;
      box-shadow: inset 0 0 4px rgba(255,255,200,0.5);
    }
    #fuel-wrap.low  #fuel-fill { background: linear-gradient(90deg, #ff4444 0%, #ff8844 100%); animation: blink 0.5s infinite; }
    #fuel-wrap.crit #fuel-fill { background: #ff2222; animation: blink 0.25s infinite; }
    #fuel-label {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      font-family: 'Press Start 2P', monospace; font-size: 7px;
      color: #000; line-height: 14px; letter-spacing: 1px;
      text-shadow: 0 0 2px rgba(255,255,255,0.5);
      pointer-events: none;
    }

    /* ゲームオーバー */
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #gameover.show { display: flex; }
    #gameover h1  { font-family: 'Press Start 2P', monospace; font-size: 28px; color: #f44; text-shadow: 3px 3px 0 #000; letter-spacing: 3px; margin-bottom: 4px; }
    #final-best   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #final-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #go-tap       { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* クリア画面 */
    #clear {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #clear.show { display: flex; }
    #clear h1  {
      font-family: 'Press Start 2P', monospace; font-size: 28px;
      color: #ffe680; text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,220,80,0.6);
      letter-spacing: 3px; margin-bottom: 4px;
      animation: clearPulse 1s infinite alternate;
    }
    @keyframes clearPulse { from { filter: brightness(1); } to { filter: brightness(1.35); } }
    #clear-dist   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #clear-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #clear-tap    { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }

  </style>
  <script type="module" crossorigin src="/kaiju-rampage/assets/index-D146xTeI.js"></script>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="360" height="580"></canvas>
  <div id="overlay">
    <div id="popup-layer"></div>
    <div id="distance-display">0 m</div>
    <div id="zone-display">Stage 1</div>
    <div id="life-wrap"><div id="life-fill"></div></div>
    <div id="speed-number">0</div>
    <div id="fuel-wrap"><div id="fuel-fill"></div><div id="fuel-label">FUEL</div></div>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div id="final-best">0 m | 0 破壊</div>
    <div id="final-stats">0 人踏み</div>
    <div id="go-tap">タップで再スタート</div>
  </div>
  <div id="clear">
    <h1>CLEAR!</h1>
    <div id="clear-dist">0 m | 0 破壊</div>
    <div id="clear-stats">0 人踏み</div>
    <div id="clear-tap">タップで再スタート</div>
  </div>
</div>
</body>
</html>
