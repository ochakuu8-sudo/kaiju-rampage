<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 360px; height: 580px;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 360px; height: 580px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* ワールド空間ポップアップレイヤー: コンテナごとカメラ追従 */
    #popup-layer {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 0;
      overflow: visible;
    }
    /* 距離: 左上 */
    #distance-display { position: absolute; top: 8px; left: 10px; font-size: 13px; color: #8cf; text-shadow: 0 1px 4px #000; }
    /* ゾーン名: 距離の右 */
    #zone-display { position: absolute; top: 8px; left: 10px; margin-top: 22px; font-size: 11px; color: #adf; text-shadow: 0 1px 4px #000; }
    /* 燃料メーター (黄色ベース、ピンチで赤点滅) */
    #life-wrap {
      position: absolute; top: 36px; left: 8px; right: 8px;
      height: 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      overflow: hidden;
    }
    #life-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffcc00 0%, #ffee55 50%, #ffdd22 100%);
      border-radius: 5px;
      transition: width 0.12s linear, background 0.2s;
      box-shadow: 0 0 6px rgba(255, 220, 60, 0.8);
    }
    /* ピンチ (low / crit) で赤に切り替えて点滅 */
    #life-wrap.low  #life-fill {
      background: linear-gradient(90deg, #ff3333 0%, #ff6644 50%, #ff3333 100%);
      box-shadow: 0 0 8px rgba(255, 70, 70, 0.9);
      animation: blink 0.5s infinite;
    }
    #life-wrap.crit #life-fill {
      background: #ff2222;
      box-shadow: 0 0 10px rgba(255, 50, 50, 1);
      animation: blink 0.2s infinite;
    }

    /* ゲームオーバー */
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #gameover.show { display: flex; }
    #gameover h1  { font-family: 'Press Start 2P', monospace; font-size: 28px; color: #f44; text-shadow: 3px 3px 0 #000; letter-spacing: 3px; margin-bottom: 4px; }
    #final-best   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #final-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #go-tap       { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* クリア画面 */
    #clear {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #clear.show { display: flex; }
    #clear h1  {
      font-family: 'Press Start 2P', monospace; font-size: 28px;
      color: #ffe680; text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,220,80,0.6);
      letter-spacing: 3px; margin-bottom: 4px;
      animation: clearPulse 1s infinite alternate;
    }
    @keyframes clearPulse { from { filter: brightness(1); } to { filter: brightness(1.35); } }
    #clear-dist   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #clear-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #clear-tap    { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }

  </style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="360" height="580"></canvas>
  <div id="overlay">
    <div id="popup-layer"></div>
    <div id="distance-display">0 m</div>
    <div id="zone-display">Stage 1</div>
    <div id="life-wrap"><div id="life-fill"></div></div>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div id="final-best">0 m | 0 破壊</div>
    <div id="final-stats">0 人踏み</div>
    <div id="go-tap">タップで再スタート</div>
  </div>
  <div id="clear">
    <h1>CLEAR!</h1>
    <div id="clear-dist">0 m | 0 破壊</div>
    <div id="clear-stats">0 人踏み</div>
    <div id="clear-tap">タップで再スタート</div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
