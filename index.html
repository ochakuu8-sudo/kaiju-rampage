<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>Kaiju Pinball — 怪獣ピンボール</title>
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <style>
    /* セルフホスト版 Press Start 2P (Google Fonts 由来 / SIL OFL 1.1) */
    @font-face {
      font-family: 'Press Start 2P';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/PressStart2P-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 360px; height: 580px;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 360px; height: 580px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* ワールド空間ポップアップレイヤー: コンテナごとカメラ追従 */
    #popup-layer {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 0;
      overflow: visible;
    }
    /* 距離・ゾーン表示は画面から非表示 (燃料ゲージに集中させる) */
    #distance-display, #zone-display { display: none; }
    /* 燃料メーター (レトロゲーム風 HP バー: セグメント分割 + チャンキー枠) */
    #life-wrap {
      position: absolute; top: 8px; left: 8px; right: 8px;
      height: 14px;
      background: #1a1208;
      border: 2px solid #e8a020;
      border-radius: 0;
      box-shadow:
        inset 0 0 0 1px #000,
        0 0 6px rgba(232, 160, 32, 0.55),
        2px 2px 0 #000;
      overflow: hidden;
      image-rendering: pixelated;
    }
    /* ラベル "FUEL" をバー内左上に */
    #life-wrap::before {
      content: 'FUEL';
      position: absolute; top: 1px; left: 3px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; letter-spacing: 1px;
      color: #000;
      text-shadow: 0 1px 0 rgba(255,255,255,0.25);
      z-index: 2;
      pointer-events: none;
    }
    #life-fill {
      height: 100%;
      width: 0%;
      /* セグメント分割: 固定 30px ピッチで 2px の目地 */
      background:
        repeating-linear-gradient(90deg,
          transparent 0 28px,
          rgba(0,0,0,0.55) 28px 30px),
        linear-gradient(180deg,
          #fff080 0%, #ffd020 35%, #cc8800 100%);
      transition: width 0.12s linear;
    }
    /* ピンチ (low): オレンジ赤 + 点滅 */
    #life-wrap.low #life-fill {
      background:
        repeating-linear-gradient(90deg,
          transparent 0 28px,
          rgba(0,0,0,0.6) 28px 30px),
        linear-gradient(180deg,
          #ffaa55 0%, #ff5522 40%, #aa2200 100%);
    }
    #life-wrap.low  { animation: blink 0.5s steps(2) infinite; }
    /* クリティカル (crit): 純赤 + 高速点滅 */
    #life-wrap.crit #life-fill {
      background:
        repeating-linear-gradient(90deg,
          transparent 0 28px,
          rgba(0,0,0,0.6) 28px 30px),
        linear-gradient(180deg, #ff6644 0%, #dd0000 50%, #881100 100%);
    }
    #life-wrap.crit { animation: blink 0.18s steps(2) infinite; }

    /* ミュートボタン — 右上にピクセル風の小さなボタン */
    #mute-btn {
      position: absolute; top: 28px; right: 8px;
      width: 24px; height: 24px;
      background: #1a1208;
      border: 2px solid #e8a020;
      color: #ffd020;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      cursor: pointer;
      pointer-events: auto;
      padding: 0;
      line-height: 20px;
      text-align: center;
      box-shadow: inset 0 0 0 1px #000, 2px 2px 0 #000;
      z-index: 5;
      image-rendering: pixelated;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #mute-btn.muted { color: #666; }

    /* ローディング画面 — Game 初期化完了まで表示 */
    #loading {
      position: absolute; inset: 0;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      flex-direction: column; gap: 14px;
      z-index: 20;
      transition: opacity 0.3s ease-out;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px; color: #ffd020;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 2px;
    }
    #loading-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: #888;
      animation: blink 1s infinite;
    }

    /* WebGL2 非対応ブラウザ向けフォールバック */
    #no-webgl {
      position: absolute; inset: 0;
      background: #111;
      display: none;
      justify-content: center; align-items: center;
      flex-direction: column; gap: 14px;
      padding: 20px; text-align: center;
      z-index: 30;
    }
    #no-webgl.show { display: flex; }
    #no-webgl h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px; color: #f44;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 1px;
    }
    #no-webgl p {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px; color: #ccc;
      line-height: 1.6;
      max-width: 320px;
    }

    /* ゲームオーバー */
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #gameover.show { display: flex; }
    #gameover h1  { font-family: 'Press Start 2P', monospace; font-size: 28px; color: #f44; text-shadow: 3px 3px 0 #000; letter-spacing: 3px; margin-bottom: 4px; }
    #final-best   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #final-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #go-tap       { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* クリア画面 */
    #clear {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #clear.show { display: flex; }
    #clear h1  {
      font-family: 'Press Start 2P', monospace; font-size: 28px;
      color: #ffe680; text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,220,80,0.6);
      letter-spacing: 3px; margin-bottom: 4px;
      animation: clearPulse 1s infinite alternate;
    }
    @keyframes clearPulse { from { filter: brightness(1); } to { filter: brightness(1.35); } }
    #clear-dist   { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa; margin-top: 8px; }
    #clear-stats  { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8cf; margin-top: 4px; }
    #clear-tap    { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }

  </style>
  <script type="module" crossorigin src="./assets/index-D2nO2C7q.js"></script>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="360" height="580"></canvas>
  <div id="overlay">
    <div id="popup-layer"></div>
    <div id="distance-display">0 m</div>
    <div id="zone-display">Stage 1</div>
    <div id="life-wrap"><div id="life-fill"></div></div>
    <button id="mute-btn" type="button" aria-label="Toggle sound">&#9834;</button>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div id="final-best">0 m | 0 DESTROYED</div>
    <div id="final-stats">0 STOMPS</div>
    <div id="go-tap">TAP TO RESTART</div>
  </div>
  <div id="clear">
    <h1>CLEAR!</h1>
    <div id="clear-dist">0 m | 0 DESTROYED</div>
    <div id="clear-stats">0 STOMPS</div>
    <div id="clear-tap">TAP TO RESTART</div>
  </div>
  <div id="loading">
    <div id="loading-title">KAIJU PINBALL</div>
    <div id="loading-text">LOADING...</div>
  </div>
  <div id="no-webgl">
    <h2>WEBGL 2 REQUIRED</h2>
    <p>This game requires a browser with WebGL 2 support.<br><br>Please update your browser or try a different one (Chrome, Firefox, Edge, Safari 15+).</p>
  </div>
</div>
</body>
</html>
