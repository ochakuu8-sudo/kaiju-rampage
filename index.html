<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 360px; height: 580px;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 360px; height: 580px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* ワールド空間ポップアップレイヤー: コンテナごとカメラ追従 */
    #popup-layer {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 0;
      overflow: visible;
    }
    /* 距離: 左上 */
    #distance-display { position: absolute; top: 8px; left: 10px; font-size: 13px; color: #8cf; text-shadow: 0 1px 4px #000; }
    /* ゾーン名: 距離の右 */
    #zone-display { position: absolute; top: 8px; left: 10px; margin-top: 22px; font-size: 11px; color: #adf; text-shadow: 0 1px 4px #000; }
    /* スピードメーター (レースゲーム風) */
    #life-wrap {
      position: absolute; top: 36px; left: 8px; right: 48px;
      height: 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      overflow: hidden;
    }
    #life-fill {
      height: 100%;
      width: 0%;
      /* グラデーションはメーター全体幅に敷き、fill の width でマスクする。
         background-size は JS 側で (100 / pct * 100)% に設定。
         10% ごとにはっきり色が切り替わる 10 段階のハードステップ。 */
      background-image: linear-gradient(90deg,
        #0048ff 0% 10%,
        #0088ff 10% 20%,
        #00ccff 20% 30%,
        #00e8a0 30% 40%,
        #22cc22 40% 50%,
        #aadd00 50% 60%,
        #ffee00 60% 70%,
        #ff8800 70% 80%,
        #ff2222 80% 90%,
        #ff00aa 90% 100%);
      background-repeat: no-repeat;
      background-position: left center;
      background-size: 10000% 100%;
      border-radius: 5px;
      transition: width 0.12s;
      box-shadow: 0 0 6px currentColor;
    }
    #life-fill.high { animation: speedpulse 0.4s infinite alternate; }
    @keyframes speedpulse { from { filter: brightness(1); } to { filter: brightness(1.4); } }
    /* 速度数値: バーの右 */
    #speed-number {
      position: absolute; top: 32px; right: 8px;
      font-size: 12px; font-weight: 400;
      color: #fff; text-shadow: 2px 2px 0 #000, 0 0 6px #0cf;
      font-family: 'Press Start 2P', monospace;
      letter-spacing: 0.5px;
      min-width: 36px; text-align: right;
    }

    /* タイマー: 上部中央 */
    #timer-display {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      font-size: 24px; font-weight: 400; color: #ffe680;
      font-family: 'Press Start 2P', monospace;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 1px;
    }
    #timer-display.low  { color: #ff6; animation: blink 0.5s infinite; }
    #timer-display.crit { color: #f44; animation: blink 0.25s infinite; }

    /* 被害総額: タイマーの下 (レトロスコアカウンター) */
    #damage-display {
      position: absolute; top: 38px; left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 400; color: #fff;
      font-family: 'Press Start 2P', monospace;
      white-space: nowrap;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
      letter-spacing: 1px;
    }
    #damage-display.pulse {
      animation: score-tick 0.15s ease-out;
    }
    @keyframes score-tick {
      0%   { color: #ffff66; transform: translateX(-50%) scale(1.12); }
      100% { color: #fff;    transform: translateX(-50%) scale(1); }
    }

    /* ── ダメージポップアップ (レトロRPG風 4段階、ワールド固定) ── */
    .damage-popup {
      position: absolute;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000;
      letter-spacing: 0.5px;
      transform: translate(-50%, -50%);
      animation: popup-stay 1.2s ease-out forwards;
    }
    /* ¥500+ — 黄色 */
    .damage-popup.big {
      font-size: 13px;
      color: #ffdd00;
    }
    /* ¥2000+ — オレンジ + グロー */
    .damage-popup.large {
      font-size: 16px;
      color: #ff8800;
      text-shadow: 2px 2px 0 #000, 0 0 8px rgba(255,136,0,0.6);
    }
    /* ¥5000+ — 赤フラッシュ */
    .damage-popup.mega {
      font-size: 20px;
      color: #ff3333;
      text-shadow: 2px 2px 0 #000, 0 0 12px rgba(255,50,0,0.7);
    }
    @keyframes popup-stay {
      0%   { opacity: 0;   transform: translate(-50%, -50%) scale(0.3); }
      8%   { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
      18%  { opacity: 1;   transform: translate(-50%, -50%) scale(1.0); }
      75%  { opacity: 1;   transform: translate(-50%, -50%) scale(1.0); }
      100% { opacity: 0;   transform: translate(-50%, -50%) scale(0.85); }
    }

    /* ゲームオーバー */
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #gameover.show { display: flex; }
    #gameover h1  { font-family: 'Press Start 2P', monospace; font-size: 28px; color: #f44; text-shadow: 3px 3px 0 #000; letter-spacing: 3px; margin-bottom: 4px; }
    #gameover .go-label { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #ccc; margin-bottom: 2px; }
    #final-wave   { font-family: 'Press Start 2P', monospace; font-size: 18px; color: #ffdd00; text-shadow: 2px 2px 0 #000; background: rgba(0,0,0,0.6); border: 2px solid #ffdd00; padding: 8px 20px; border-radius: 0; }
    #final-best   { font-family: 'Press Start 2P', monospace; font-size: 8px; color: #aaa; margin-top: 8px; }
    #final-stats  { font-family: 'Press Start 2P', monospace; font-size: 8px; color: #8cf; margin-top: 4px; }
    #go-tap       { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  </style>
  <script type="module" crossorigin src="/kaiju-rampage/assets/index-NaGls3Iy.js"></script>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="360" height="580"></canvas>
  <div id="overlay">
    <div id="popup-layer"></div>
    <div id="distance-display">0 m</div>
    <div id="zone-display">住宅街</div>
    <div id="life-wrap"><div id="life-fill"></div></div>
    <div id="speed-number">0</div>
    <div id="timer-display">90</div>
    <div id="damage-display">¥0</div>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div class="go-label">被害総額</div>
    <div id="final-wave">¥0</div>
    <div id="final-best">0 m | 0 破壊</div>
    <div id="final-stats">0 人踏み</div>
    <div id="go-tap">タップで再スタート</div>
  </div>
</div>
</body>
</html>
