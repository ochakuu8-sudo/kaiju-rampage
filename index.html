<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>怪獣ピンボール</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
      touch-action: none;
    }
    #wrap {
      position: relative;
      width: 360px; height: 580px;
      transform-origin: center center;
    }
    canvas {
      display: block;
      width: 360px; height: 580px;
      image-rendering: pixelated;
    }
    #overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      font-family: 'Arial Black', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
    }
    /* 距離: 左上 */
    #distance-display { position: absolute; top: 8px; left: 10px; font-size: 13px; color: #8cf; text-shadow: 0 1px 4px #000; }
    /* ゾーン名: 距離の右 */
    #zone-display { position: absolute; top: 8px; left: 10px; margin-top: 22px; font-size: 11px; color: #adf; text-shadow: 0 1px 4px #000; }
    /* スピードメーター (レースゲーム風) */
    #life-wrap {
      position: absolute; top: 36px; left: 8px; right: 48px;
      height: 10px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 5px;
      overflow: hidden;
    }
    #life-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0cf 0%, #0f8 40%, #ff6 70%, #f44 100%);
      border-radius: 5px;
      transition: width 0.12s;
      box-shadow: 0 0 6px currentColor;
    }
    #life-fill.low  { background: linear-gradient(90deg, #369, #6bd); }
    #life-fill.high { animation: speedpulse 0.4s infinite alternate; }
    @keyframes speedpulse { from { filter: brightness(1); } to { filter: brightness(1.4); } }
    /* 速度数値: バーの右 */
    #speed-number {
      position: absolute; top: 32px; right: 8px;
      font-size: 16px; font-weight: 900;
      color: #fff; text-shadow: 0 0 6px #0cf, 0 1px 3px #000;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.5px;
      min-width: 36px; text-align: right;
    }

    /* タイマー: 上部中央 */
    #timer-display {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      font-size: 32px; font-weight: 900; color: #ffe680;
      text-shadow: 0 0 8px #f80, 0 2px 4px #000;
      letter-spacing: 1px;
    }
    #timer-display.low  { color: #ff6; animation: blink 0.5s infinite; }
    #timer-display.crit { color: #f44; animation: blink 0.25s infinite; }

    /* 被害総額: タイマーの下 (災害速報風) */
    #damage-display {
      position: absolute; top: 42px; left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 700; color: #fff;
      background: rgba(180, 0, 0, 0.85);
      padding: 2px 10px;
      border-radius: 2px;
      white-space: nowrap;
      text-shadow: 0 1px 2px #000;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      letter-spacing: 0.5px;
    }

    /* ── ダメージポップアップ ── */
    .damage-popup {
      position: absolute;
      font-size: 12px; font-weight: 900;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      color: #fff; white-space: nowrap;
      background: rgba(180, 0, 0, 0.8);
      padding: 1px 6px;
      border-radius: 2px;
      text-shadow: 0 1px 2px #000;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.6);
      animation: popup-rise 1.0s ease-out forwards;
    }
    .damage-popup.big {
      font-size: 15px;
      padding: 2px 8px;
      background: rgba(200, 0, 0, 0.9);
    }
    .damage-popup.mega {
      font-size: 20px;
      padding: 3px 12px;
      background: rgba(220, 0, 0, 0.95);
      box-shadow: 0 0 12px rgba(255, 60, 0, 0.6);
    }
    @keyframes popup-rise {
      0%   { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      15%  { opacity: 1; transform: translate(-50%, -80%) scale(1.3); }
      30%  { opacity: 1; transform: translate(-50%, -100%) scale(1.0); }
      100% { opacity: 0; transform: translate(-50%, -160%) scale(0.8); }
    }

    /* ゲームオーバー */
    #gameover {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; justify-content: center; align-items: center;
      gap: 10px; pointer-events: auto; z-index: 10;
    }
    #gameover.show { display: flex; }
    #gameover h1  { font-size: 44px; color: #f44; text-shadow: 0 0 20px #f00; margin-bottom: 4px; }
    #gameover .go-label { font-size: 13px; color: #ccc; margin-bottom: 2px; }
    #final-wave   { font-size: 30px; font-weight: 900; color: #fff; background: rgba(180,0,0,0.9); padding: 4px 18px; border-radius: 3px; text-shadow: 0 1px 3px #000; }
    #final-best   { font-size: 14px; color: #aaa; margin-top: 8px; }
    #final-stats  { font-size: 13px; color: #8cf; margin-top: 4px; }
    #go-tap       { font-size: 17px; color: #8f8; margin-top: 16px; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

  </style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas" width="360" height="580"></canvas>
  <div id="overlay">
    <div id="distance-display">0 m</div>
    <div id="zone-display">住宅街</div>
    <div id="life-wrap"><div id="life-fill"></div></div>
    <div id="speed-number">0</div>
    <div id="timer-display">90</div>
    <div id="damage-display">被害総額 ¥0</div>
  </div>
  <div id="gameover">
    <h1>GAME OVER</h1>
    <div class="go-label">被害総額</div>
    <div id="final-wave">¥0</div>
    <div id="final-best">0 m | 0 破壊</div>
    <div id="final-stats">0 人踏み</div>
    <div id="go-tap">タップで再スタート</div>
  </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
