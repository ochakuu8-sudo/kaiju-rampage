<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Kaiju Pinball — One Screen Prototype</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0} html,body{width:100%;height:100%;background:#08070a;display:flex;align-items:center;justify-content:center;overflow:hidden;touch-action:none;font-family:system-ui,sans-serif;color:#fff}
  #wrap{position:relative;width:360px;height:580px;transform-origin:center} canvas{width:360px;height:580px;display:block;background:#111;image-rendering:pixelated}
  #hud{position:absolute;inset:0;pointer-events:none;font:700 12px monospace;text-shadow:2px 2px #000;color:#fff}
  #fuel{position:absolute;left:8px;right:8px;top:8px;height:13px;border:2px solid #e8a020;background:#1a1208;box-shadow:2px 2px #000} #fuelFill{height:100%;width:100%;background:linear-gradient(90deg,#f54,#fd2,#7f6)}
  #score{position:absolute;left:8px;top:28px;color:#ffd36a} #targets{position:absolute;left:8px;top:45px;color:#8cf} #destroy{position:absolute;right:8px;top:45px;color:#fff;text-align:right}
  #msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;font:900 22px monospace;letter-spacing:2px;color:#ffd020;text-shadow:3px 3px #000;white-space:pre-line;pointer-events:none}
  #sub{position:absolute;left:0;right:0;bottom:16px;text-align:center;font:700 10px monospace;color:#aaa;text-shadow:2px 2px #000}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c" width="360" height="580"></canvas>
<div id="hud">
  <div id="fuel"><div id="fuelFill"></div></div>
  <div id="score">SCORE 0</div>
  <div id="targets">TARGET 0/3</div>
  <div id="destroy">DEST 0%</div>
  <div id="msg">ONE SCREEN TEST\nTAP / CLICK TO START</div>
  <div id="sub">左右同時フリッパー / 重要施設3つ + 破壊率80%でクリア</div>
</div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const W=360,H=580,scoreEl=document.getElementById('score'),targetEl=document.getElementById('targets'),destEl=document.getElementById('destroy'),fuelEl=document.getElementById('fuelFill'),msg=document.getElementById('msg'),wrap=document.getElementById('wrap');
function scale(){wrap.style.transform=`scale(${Math.min(innerWidth/W,innerHeight/H)})`} addEventListener('resize',scale); scale();
const defs={house:[16,20,1,100,'#b96'],townhouse:[20,26,1,120,'#ca8'],garage:[22,14,1,80,'#888'],shop:[28,25,1,180,'#8ac'],ramen:[24,22,1,160,'#d65'],convenience:[34,24,2,350,'#6d8'],apartment:[36,46,2,600,'#89a'],station:[62,38,3,2000,'#dc8'],hospital:[48,52,3,1800,'#eef'],tower:[36,72,3,2500,'#8bd']};
let buildings,humans,particles,ball,pressed=false,started=false,clear=false,gameover=false,score=0,fuel=100,total=0;
function B(type,x,y,target=false){let d=defs[type]; return {type,x,y,w:d[0],h:d[1],hp:d[2],max:d[2],score:d[3],color:d[4],target,alive:true,flash:0};}
function reset(){
  buildings=[
    B('house',45,52),B('townhouse',85,58),B('garage',128,48),B('convenience',175,52,true),B('house',235,54),B('house',285,56),
    B('ramen',55,150),B('shop',95,155),B('shop',138,155),B('apartment',210,135,true),B('townhouse',270,150),B('garage',310,142),
    B('house',45,250),B('house',82,252),B('ramen',128,248),B('station',200,238,true),B('shop',278,252),B('house',320,254),
    B('hospital',85,350,true),B('tower',165,340,true),B('apartment',245,350),B('convenience',310,358)
  ];
  humans=[]; for(let i=0;i<55;i++) humans.push({x:20+Math.random()*320,y:95+Math.random()*285,alive:true,vx:(Math.random()*2-1)*18,vy:(Math.random()*2-1)*18});
  particles=[]; ball={x:180,y:470,vx:0,vy:-5,r:14}; score=0; fuel=100; total=buildings.length; clear=false; gameover=false; started=false; msg.textContent='ONE SCREEN TEST\nTAP / CLICK TO START'; updateHud();
}
function updateHud(){scoreEl.textContent='SCORE '+score; const t=buildings.filter(b=>b.target).length,td=buildings.filter(b=>b.target&&!b.alive).length; targetEl.textContent=`TARGET ${td}/${t}`; destEl.textContent='DEST '+Math.floor(100*(total-buildings.filter(b=>b.alive).length)/total)+'%'; fuelEl.style.width=Math.max(0,fuel)+'%';}
function rectHit(cx,cy,r,b){let nx=Math.max(b.x-b.w/2,Math.min(cx,b.x+b.w/2)),ny=Math.max(b.y,Math.min(cy,b.y+b.h)); let dx=cx-nx,dy=cy-ny; return dx*dx+dy*dy<r*r?{dx,dy,nx,ny}:null}
function smash(b){b.hp--; b.flash=.08; ball.vy*=-.72; ball.vx+=(ball.x-b.x)*.025; if(b.hp<=0&&b.alive){b.alive=false; score+=b.score*(b.target?3:1); fuel=Math.min(100,fuel+(b.target?18:6)); for(let i=0;i<18;i++)particles.push({x:b.x,y:b.y+b.h/2,vx:(Math.random()*2-1)*90,vy:(Math.random()*2-1)*90,life:.45,c:b.color});}}
function flipper(left){const px=left?86:274,py=520,len=72,a=(left?-0.50:Math.PI+0.50)+(pressed?(left?0.85:-0.85):0); const x2=px+Math.cos(a)*len,y2=py+Math.sin(a)*len; return {px,py,x2,y2,a,left};}
function lineBall(f){let ax=f.px,ay=f.py,bx=f.x2,by=f.y2,dx=bx-ax,dy=by-ay,t=((ball.x-ax)*dx+(ball.y-ay)*dy)/(dx*dx+dy*dy); t=Math.max(0,Math.min(1,t)); let x=ax+dx*t,y=ay+dy*t,ddx=ball.x-x,ddy=ball.y-y,d=Math.hypot(ddx,ddy); if(d<ball.r+5){let nx=ddx/(d||1),ny=ddy/(d||1); ball.x=x+nx*(ball.r+5); ball.y=y+ny*(ball.r+5); const p=pressed?10:4; ball.vx+=nx*p+(f.left?3:-3); ball.vy+=ny*p-pressed*10;}}
function update(dt){if(!started||clear||gameover)return; fuel-=dt*3.5; if(fuel<=0){gameover=true;msg.textContent='GAME OVER\nTAP / CLICK TO RETRY'}
  ball.vy+=18*dt; ball.x+=ball.vx*dt*60; ball.y+=ball.vy*dt*60; ball.vx*=.995; ball.vy*=.995;
  if(ball.x<ball.r){ball.x=ball.r;ball.vx=Math.abs(ball.vx)*.75} if(ball.x>W-ball.r){ball.x=W-ball.r;ball.vx=-Math.abs(ball.vx)*.75} if(ball.y<ball.r){ball.y=ball.r;ball.vy=Math.abs(ball.vy)*.75} if(ball.y>H+40){ball.x=180;ball.y=470;ball.vx=0;ball.vy=-8;fuel=Math.max(0,fuel-12)}
  lineBall(flipper(true)); lineBall(flipper(false));
  for(const b of buildings){if(b.flash>0)b.flash-=dt;if(!b.alive)continue;let h=rectHit(ball.x,ball.y,ball.r,b); if(h)smash(b)}
  for(const h of humans){if(!h.alive)continue; h.x+=h.vx*dt;h.y+=h.vy*dt; if(h.x<12||h.x>348)h.vx*=-1;if(h.y<80||h.y>420)h.vy*=-1; if((h.x-ball.x)**2+(h.y-ball.y)**2<(ball.r+5)**2){h.alive=false;score+=10;fuel=Math.min(100,fuel+2);particles.push({x:h.x,y:h.y,vx:0,vy:-60,life:.25,c:'#f44'});}}
  for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.vy+=80*dt} particles=particles.filter(p=>p.life>0);
  const targetDone=buildings.filter(b=>b.target&&!b.alive).length>=3; const dest=(total-buildings.filter(b=>b.alive).length)/total; if(targetDone&&dest>=.8){clear=true;score+=5000;msg.textContent='STAGE CLEAR!\nTAP / CLICK TO RETRY'} updateHud();}
function draw(){ctx.clearRect(0,0,W,H);let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#203040');g.addColorStop(1,'#15120e');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#333'; for(const y of [110,210,310,410]){ctx.fillRect(0,y-7,W,14);ctx.fillStyle='#777';for(let x=0;x<W;x+=38)ctx.fillRect(x,y-1,18,2);ctx.fillStyle='#333'} ctx.fillStyle='#2d3d2a';ctx.fillRect(0,430,W,150);
  for(const b of buildings){ctx.globalAlpha=b.alive?1:.22;ctx.fillStyle=b.flash>0?'#fff':b.color;ctx.fillRect(b.x-b.w/2,b.y,b.w,b.h);ctx.fillStyle=b.target?'#ffd020':'#111';ctx.fillRect(b.x-b.w/2+3,b.y+b.h-6,b.w-6,3); if(b.target&&b.alive){ctx.strokeStyle='#ffd020';ctx.lineWidth=2;ctx.strokeRect(b.x-b.w/2-2,b.y-2,b.w+4,b.h+4)}} ctx.globalAlpha=1;
  ctx.fillStyle='#ffdf8a';for(const h of humans)if(h.alive)ctx.fillRect(h.x-1.5,h.y-3,3,6);
  for(const p of particles){ctx.globalAlpha=Math.max(0,p.life*2);ctx.fillStyle=p.c;ctx.fillRect(p.x-2,p.y-2,4,4)}ctx.globalAlpha=1;
  for(const f of [flipper(true),flipper(false)]){ctx.strokeStyle='#ffd020';ctx.lineWidth=8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(f.px,f.py);ctx.lineTo(f.x2,f.y2);ctx.stroke()}
  ctx.fillStyle='#ff5533';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffd0a0';ctx.beginPath();ctx.arc(ball.x-5,ball.y-5,4,0,Math.PI*2);ctx.fill();
}
let last=performance.now();function loop(now){let dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}
function press(v){pressed=v;if(!started||clear||gameover){reset();started=true;msg.textContent=''}}
addEventListener('mousedown',()=>press(true));addEventListener('mouseup',()=>pressed=false);addEventListener('touchstart',e=>{e.preventDefault();press(true)},{passive:false});addEventListener('touchend',e=>{e.preventDefault();pressed=false},{passive:false});addEventListener('keydown',e=>{if(!e.repeat)press(true)});addEventListener('keyup',()=>pressed=false);
reset();requestAnimationFrame(loop);
</script>
</body>
</html>
