<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>90x90 Grid Prototype</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #08080c; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    #wrap { position: relative; width: 360px; height: 580px; background: #101018; border: 2px solid #33384a; }
    canvas { width: 360px; height: 580px; display: block; image-rendering: pixelated; }
    #hud { position: absolute; left: 8px; top: 8px; right: 8px; color: #fff; font: 10px monospace; display: flex; justify-content: space-between; text-shadow: 1px 1px #000; pointer-events: none; }
    #legend { position: absolute; left: 8px; right: 8px; bottom: 8px; color: #d8d8e8; background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2); padding: 6px; font: 8px/1.45 monospace; pointer-events: none; }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="prototypeCanvas" width="360" height="580"></canvas>
    <div id="hud"><div>90x90 / 4 COLS</div><div>WRECK SPRINT PROTOTYPE</div></div>
    <div id="legend">. SAFE / h LIGHT / F FUEL / B BOOST / G GAS / D DENSE / S SCORE / X HAZARD / R RECOVERY / K GOAL<br>Mouse wheel / arrow keys: scroll preview.</div>
  </div>
  <script type="module" src="/src/prototype90.ts"></script>
</body>
</html>
