<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KAIJU PINBALL — Screenshot</title>
<style>
  @font-face {
    font-family: 'Press Start 2P';
    src: url('../fonts/PressStart2P-latin.woff2') format('woff2');
    font-display: block;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100%;
    background: #222;
    font-family: 'Press Start 2P', monospace;
    overflow: auto;
    display: flex; justify-content: center; align-items: center;
    padding: 20px;
  }

  /* ゲームの縦長盤面 (360x580) を 2x スケール = 720x1160 で再現 */
  .frame {
    position: relative;
    width: 720px;
    height: 1160px;
    overflow: hidden;
    image-rendering: pixelated;
    /* 昼の空 → 地面のグラデ */
    background: linear-gradient(180deg,
      #b8d8f0 0%,
      #c8e0ec 20%,
      #d0e0d0 40%,
      #b8c8a8 60%,
      #a8b898 80%,
      #98a888 100%
    );
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }

  /* ======== 道路 ======== */
  /* 縦の大通り (3列の間) */
  .road-v {
    position: absolute;
    top: 0; bottom: 0;
    background: #787874;
    border-left: 2px solid #5a5a56;
    border-right: 2px solid #5a5a56;
  }
  .road-v::before {
    content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: 3px;
    transform: translateX(-50%);
    background: repeating-linear-gradient(180deg, #f0f0c0 0 14px, transparent 14px 28px);
  }
  /* 横の通り (6行の間) */
  .road-h {
    position: absolute;
    left: 0; right: 0;
    background: #6a6a66;
    border-top: 2px solid #4a4a46;
    border-bottom: 2px solid #4a4a46;
  }
  .road-h::before {
    content: ''; position: absolute; left: 0; right: 0; top: 50%; height: 3px;
    transform: translateY(-50%);
    background: repeating-linear-gradient(90deg, #f0f0c0 0 14px, transparent 14px 28px);
  }

  /* ======== 建物ブロック ======== */
  .block {
    position: absolute;
    display: flex;
    flex-direction: row;
    align-items: flex-end;
    gap: 4px;
    padding: 4px;
  }
  .building {
    position: relative;
    flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.6);
    box-shadow: inset -2px -4px 0 rgba(0,0,0,0.18), inset 2px 2px 0 rgba(255,255,255,0.15);
    image-rendering: pixelated;
  }
  /* 窓グリッド (黄色い点、昼間も少しだけ見える) */
  .building::after {
    content: '';
    position: absolute;
    inset: 8px 4px 8px 4px;
    background-image: radial-gradient(circle 1.8px at 3px 3px, #dde0cc, transparent 3px);
    background-size: 8px 10px;
    opacity: 0.55;
  }
  /* 屋根のハイライトライン */
  .building::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.25);
    pointer-events: none;
  }
  /* 看板/アンテナ装飾 */
  .antenna {
    position: absolute;
    top: -12px; left: 50%;
    transform: translateX(-50%);
    width: 3px; height: 12px;
    background: #333;
  }
  .antenna::after {
    content: ''; position: absolute; top: -6px; left: -3px;
    width: 9px; height: 6px; background: #d04030;
    border: 1px solid #000;
  }
  .rooftop-ac {
    position: absolute;
    top: 2px; width: 14px; height: 8px;
    background: #999;
    border: 1px solid #444;
  }
  .storefront {
    position: absolute;
    bottom: 0; left: 20%; right: 20%;
    height: 12px;
    background: rgba(120,180,220,0.5);
    border-top: 2px solid rgba(0,0,0,0.4);
    border-bottom: 2px solid rgba(0,0,0,0.4);
  }

  /* 地面/アスファルト (建物の下) */
  .ground {
    position: absolute;
    background: #8a9878;
    border: 1px dashed rgba(0,0,0,0.15);
  }

  /* 車 (道路に数台) */
  .car {
    position: absolute;
    width: 14px; height: 22px;
    border-radius: 2px;
    border: 1.5px solid rgba(0,0,0,0.7);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }
  .car::before {
    content: ''; position: absolute; top: 4px; left: 2px; right: 2px; height: 4px;
    background: rgba(120, 200, 240, 0.7);
    border-radius: 1px;
  }
  .car::after {
    content: ''; position: absolute; bottom: 4px; left: 2px; right: 2px; height: 4px;
    background: rgba(120, 200, 240, 0.7);
    border-radius: 1px;
  }
  .car.horizontal {
    width: 22px; height: 14px;
  }
  .car.horizontal::before {
    top: 2px; left: 4px; right: 4px; height: 10px; width: auto;
  }
  .car.horizontal::after { display: none; }

  /* 人 (ドット) */
  .human {
    position: absolute;
    width: 3px; height: 4px;
    border: 1px solid rgba(0,0,0,0.6);
  }

  /* タイトルオーバーレイ */
  .title {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 50;
    pointer-events: none;
  }
  .title h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 88px;
    line-height: 1.1;
    color: #ffd020;
    letter-spacing: 8px;
    text-shadow:
      6px 6px 0 #000,
      -3px 0 0 #000,
      3px 0 0 #000,
      0 -3px 0 #000,
      0 3px 0 #000;
    margin: 0;
  }
  .title .sub {
    margin-top: 28px;
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: #ff5030;
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 #000, -2px 0 0 #000, 2px 0 0 #000;
  }
  .title .tag {
    margin-top: 18px;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #ffffff;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 #000;
  }

  /* 撮影メモ (印刷時非表示) */
  .info {
    position: fixed;
    top: 12px; left: 12px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.8);
    border: 1px solid #555;
    color: #8cf;
    font-size: 9px;
    line-height: 1.8;
    z-index: 200;
  }
  .info b { color: #ffd020; }
  @media print { .info { display: none; } }
</style>
</head>
<body>

<div class="info">
  <b>KAIJU PINBALL SCREENSHOT PAGE</b><br>
  Frame: 720 x 1160 (portrait, 2x of game 360x580)<br>
  DevTools &gt; Capture node screenshot of .frame
</div>

<div class="frame" id="frame"></div>

<script>
// ゲームの座標系: x ∈ [-180, 180], y ∈ [-290, 290]
// 画面座標: x_px = (x + 180) * 2, y_px = 1160 - (y + 290) * 2  (y 反転)
// スケール = 2

const SCALE = 2;
const FRAME_W = 720;
const FRAME_H = 1160;
const WORLD_Y_MIN = -290;
const WORLD_Y_MAX = 290;

function xToPx(x) { return (x + 180) * SCALE; }
function yToPx(y) { return FRAME_H - (y + 290) * SCALE; }

// ゲーム内 3 列の xMin/xMax (stages.ts より)
const COLS = [
  { xMin: -177, xMax:  -62 },
  { xMin:  -38, xMax:   68 },
  { xMin:   92, xMax:  177 },
];

// ゲーム内 6 行の baseY (stages.ts より)
// row0 = 上段 (ビル)、row5 = 下段 (家)
const ROWS = [162, 86, 52, -12, -36, -60];

// 各行のビル情報: [幅w, 高h, 色, 装飾種]
// 色はゲーム内パレット (entities.ts) に準拠
const ROW_BUILDINGS = [
  // row0: 超高層 (skyscraper, tower, office, hospital, school, clock_tower)
  [
    { w: 28, h: 90, color: '#99aecc', kind: 'skyscraper' },
    { w: 35, h: 70, color: '#85a6bf', kind: 'tower' },
    { w: 30, h: 55, color: '#aeaea6', kind: 'office' },
    { w: 35, h: 50, color: '#e6e6eb', kind: 'hospital' },
    { w: 40, h: 45, color: '#d9d19a', kind: 'school' },
    { w: 22, h: 58, color: '#d8cf96', kind: 'clock_tower' },
    { w: 26, h: 58, color: '#94a6b8', kind: 'apartment_tall' },
    { w: 30, h: 55, color: '#d4c9b8', kind: 'city_hall' },
  ],
  // row1 中段奥: アパート, 店, temple, 商業中型
  [
    { w: 24, h: 40, color: '#ccbf9d', kind: 'apartment' },
    { w: 22, h: 25, color: '#9eae99', kind: 'shop' },
    { w: 30, h: 30, color: '#855134', kind: 'temple' },
    { w: 36, h: 35, color: '#aeaea6', kind: 'parking' },
    { w: 40, h: 28, color: '#9ee085', kind: 'supermarket' },
    { w: 28, h: 32, color: '#d1c29e', kind: 'bank' },
    { w: 30, h: 32, color: '#b3a099', kind: 'library' },
    { w: 32, h: 30, color: '#b861d1', kind: 'love_hotel' },
  ],
  // row2 中段手前: カフェ・飲食・アーケード (小中型、派手め)
  [
    { w: 22, h: 25, color: '#a1b8a6', kind: 'shop' },
    { w: 20, h: 28, color: '#c79966', kind: 'restaurant' },
    { w: 24, h: 22, color: '#e2d2a8', kind: 'convenience' },
    { w: 24, h: 30, color: '#c73899', kind: 'karaoke' },
    { w: 30, h: 28, color: '#e6b340', kind: 'pachinko' },
    { w: 28, h: 26, color: '#4085e0', kind: 'game_center' },
    { w: 18, h: 20, color: '#c79961', kind: 'cafe' },
    { w: 18, h: 22, color: '#b8968f', kind: 'bookstore' },
    { w: 20, h: 22, color: '#e0f0e0', kind: 'pharmacy' },
  ],
  // row3 下段奥: 小型住宅/商店
  [
    { w: 16, h: 20, color: '#b86a4d', kind: 'house' },
    { w: 24, h: 22, color: '#d2e2a8', kind: 'convenience' },
    { w: 16, h: 20, color: '#94a6b8', kind: 'house' },
    { w: 18, h: 24, color: '#a68461', kind: 'townhouse' },
    { w: 28, h: 22, color: '#e6c970', kind: 'daycare' },
    { w: 26, h: 24, color: '#e0edf3', kind: 'clinic' },
    { w: 16, h: 18, color: '#e0c68a', kind: 'bakery' },
    { w: 14, h: 18, color: '#b85c73', kind: 'florist' },
    { w: 16, h: 20, color: '#c28758', kind: 'ramen' },
  ],
  // row4 下段中: 小型住宅
  [
    { w: 16, h: 20, color: '#ccbf9d', kind: 'house' },
    { w: 16, h: 20, color: '#b86a4d', kind: 'house' },
    { w: 18, h: 22, color: '#a68461', kind: 'townhouse' },
    { w: 24, h: 18, color: '#ccc9bf', kind: 'convenience' },
    { w: 18, h: 18, color: '#c5bfb0', kind: 'laundromat' },
    { w: 20, h: 22, color: '#a88547', kind: 'izakaya' },
    { w: 16, h: 20, color: '#94a6b8', kind: 'house' },
    { w: 16, h: 20, color: '#b86a4d', kind: 'house' },
    { w: 12, h: 12, color: '#6b5b47', kind: 'shed' },
  ],
  // row5 下段手前: 一番小さい家とガソリンスタンド
  [
    { w: 16, h: 20, color: '#b86a4d', kind: 'house' },
    { w: 16, h: 20, color: '#94a6b8', kind: 'house' },
    { w: 20, h: 14, color: '#8a7a6a', kind: 'garage' },
    { w: 18, h: 24, color: '#a68461', kind: 'townhouse' },
    { w: 16, h: 20, color: '#ccbf9d', kind: 'house' },
    { w: 16, h: 20, color: '#b86a4d', kind: 'house' },
    { w: 28, h: 18, color: '#e6e220', kind: 'gas_station' },
    { w: 16, h: 20, color: '#94a6b8', kind: 'house' },
  ],
];

const frame = document.getElementById('frame');

// ───── 縦の道路 (列と列の間) ─────
[
  { leftX: -62, rightX: -38 },   // col0 と col1 の間
  { leftX:  68, rightX:  92 },   // col1 と col2 の間
].forEach(r => {
  const d = document.createElement('div');
  d.className = 'road-v';
  d.style.left = xToPx(r.leftX) + 'px';
  d.style.width = (r.rightX - r.leftX) * SCALE + 'px';
  frame.appendChild(d);
});
// 世界の端の車道 (端のビルの外側)
[{ l: -180, r: -177 }, { l: 177, r: 180 }].forEach(r => {
  const d = document.createElement('div');
  d.className = 'road-v';
  d.style.left = xToPx(r.l) + 'px';
  d.style.width = (r.r - r.l) * SCALE + 'px';
  frame.appendChild(d);
});

// ───── 横の道路 (行と行の間) ─────
// 各行のビルの最大高さを使って、行の上端 = baseY + maxH
// 次の行の下端 = 次 baseY
const rowMaxH = ROW_BUILDINGS.map(row => Math.max(...row.map(b => b.h)));
for (let i = 0; i < ROWS.length - 1; i++) {
  const upperRowBottomY = ROWS[i];              // 上の行の base (= 下端)
  const lowerRowTopY = ROWS[i + 1] + rowMaxH[i + 1]; // 下の行の上端
  const roadTopY = upperRowBottomY;
  const roadBotY = lowerRowTopY;
  // y_px では逆転
  const top = yToPx(roadTopY);
  const bot = yToPx(roadBotY);
  if (bot > top) {
    const d = document.createElement('div');
    d.className = 'road-h';
    d.style.top = top + 'px';
    d.style.height = (bot - top) + 'px';
    frame.appendChild(d);
  }
}

// ───── ビル配置 (各列・各行のプールからブロック幅いっぱいに敷き詰める) ─────
for (let ri = 0; ri < ROWS.length; ri++) {
  const baseY = ROWS[ri];
  const pool = ROW_BUILDINGS[ri];
  for (let ci = 0; ci < COLS.length; ci++) {
    const col = COLS[ci];
    const blockWorldW = col.xMax - col.xMin;
    let x = col.xMin + 2;
    let idx = (ri * 7 + ci * 3) % pool.length; // ランダムっぽい開始点
    while (x < col.xMax - 4) {
      const b = pool[idx % pool.length];
      if (x + b.w > col.xMax - 2) break;
      const d = document.createElement('div');
      d.className = 'building';
      d.style.left = xToPx(x) + 'px';
      d.style.width = b.w * SCALE + 'px';
      d.style.height = b.h * SCALE + 'px';
      d.style.top = (yToPx(baseY + b.h)) + 'px';
      d.style.background = `linear-gradient(180deg, ${b.color} 0%, ${shadeHex(b.color, -0.25)} 100%)`;
      // 装飾
      if (b.h >= 50) {
        const a = document.createElement('div'); a.className = 'antenna'; d.appendChild(a);
      }
      if (b.h >= 40) {
        const ac1 = document.createElement('div'); ac1.className = 'rooftop-ac';
        ac1.style.left = '20%'; d.appendChild(ac1);
        const ac2 = document.createElement('div'); ac2.className = 'rooftop-ac';
        ac2.style.right = '20%'; d.appendChild(ac2);
      }
      if (b.h >= 20 && b.h <= 35 && Math.random() > 0.5) {
        const sf = document.createElement('div'); sf.className = 'storefront';
        d.appendChild(sf);
      }
      frame.appendChild(d);
      x += b.w + 3;
      idx++;
    }
  }
}

// ───── 道路に車を数台配置 ─────
const carColors = ['#d03030', '#3060c0', '#e0c830', '#b0b0b0', '#40a0a0', '#d0a040', '#ffffff'];
function addCar(x, y, horizontal) {
  const c = document.createElement('div');
  c.className = 'car' + (horizontal ? ' horizontal' : '');
  c.style.left = xToPx(x) + 'px';
  c.style.top = yToPx(y) + 'px';
  c.style.background = carColors[Math.random() * carColors.length | 0];
  frame.appendChild(c);
}
// 横道に車
const hRoadYs = [];
for (let i = 0; i < ROWS.length - 1; i++) {
  const upperBottom = ROWS[i];
  const lowerTop = ROWS[i + 1] + rowMaxH[i + 1];
  hRoadYs.push((upperBottom + lowerTop) / 2);
}
hRoadYs.forEach((y, i) => {
  const n = 3 + (i % 2);
  for (let j = 0; j < n; j++) {
    addCar(-160 + j * 80 + (i * 15), y + (j % 2 ? 4 : -4), true);
  }
});
// 縦道に車
[-50, 80].forEach(x => {
  for (let k = 0; k < 5; k++) {
    addCar(x + (k % 2 ? 4 : -4), 200 - k * 80, false);
  }
});

// ───── 人を少し (アクセント) ─────
for (let i = 0; i < 40; i++) {
  const h = document.createElement('div');
  h.className = 'human';
  const x = -170 + Math.random() * 340;
  const y = -80 + Math.random() * 260;
  h.style.left = xToPx(x) + 'px';
  h.style.top = yToPx(y) + 'px';
  h.style.background = ['#ff6060','#6080ff','#f0d060','#60d060','#f090d0'][Math.random()*5|0];
  frame.appendChild(h);
}

// ───── タイトル (オーバーレイ) ─────
const title = document.createElement('div');
title.className = 'title';
title.innerHTML = `
  <h1>KAIJU<br>PINBALL</h1>
  <div class="sub">CRUSH THE CITY</div>
  <div class="tag">STOMP FOR FUEL &#9830; 5 STAGES + BOSS</div>
`;
frame.appendChild(title);

// ───── 色ユーティリティ ─────
function shadeHex(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
  if (amt < 0) {
    const m = 1 + amt;
    r = (r * m) | 0; g = (g * m) | 0; b = (b * m) | 0;
  } else {
    r = Math.min(255, r + ((255 - r) * amt) | 0);
    g = Math.min(255, g + ((255 - g) * amt) | 0);
    b = Math.min(255, b + ((255 - b) * amt) | 0);
  }
  return `rgb(${r},${g},${b})`;
}
</script>
